<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>registro - MONOBARBERSHOP</title>
    
    <style>
        /* Define el fondo con un degradado lineal y centra el contenido en la pantalla */
        body {
            background: linear-gradient(to bottom, #4e545c, #2c3e50);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; /* Uso de Flexbox para centrar el formulario */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Contenedor que limita el ancho del formulario para que sea responsivo */
        .main-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        /* Estilo para el título principal del módulo */
        .title {
            color: #1a1a1a;
            font-size: 24px;
            margin-bottom: 30px;
        }

        /* Grid Layout: Organiza los campos en 2 columnas iguales con un espacio de 15px entre filas */
        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 15px 10px;
        }

        /* Estructura para cada etiqueta y su respectivo campo de texto */
        .input-group {
            text-align: left;
        }

        /* Estilo de la etiqueta descriptiva del campo */
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #1a1a1a;
        }

        /* Estilo de los campos de entrada: Asegura que ocupen el 100% de su columna */
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #999;
            border-radius: 2px;
            box-sizing: border-box; /* Incluye el padding en el ancho total */
            background-color: #fff;
        }

        /* Contenedor del botón: Se expande a lo ancho de las dos columnas (span 2) */
        .button-container {
            grid-column: span 2;
            margin-top: 40px;
            display: flex;
            justify-content: center;
        }

        /* Estilo del botón de acción principal con sombra para efecto de relieve */
        .btn-guardar {
            background-color: #008cff;
            color: white;
            border: none;
            padding: 12px 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body> 
   
    <div class="main-container">
        
        <h2 style="text-align: center;">Informacion del usuario</h2>

    <div th:if="${mensaje}" 
         style="color: #721c24; background-color: #f8d7da; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 10px;">
        <span th:text="${mensaje}"></span>
    </div>

    <div th:if="${mensajeExito}" 
         style="color: #155724; background-color: #d4edda; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 10px;">
         <span th:text="${mensajeExito}"></span>
    </div>
        
        <!-- Formulario que envía los datos al backend -->
        <form action="/clientes/guardar" method="post">
            
            <div class="input-group">
                <label>Nombre</label>
                <input type="text" name="nombre" placeholder="Cristian" required>
            </div>

            <div class="input-group">
                <label>Segundo nombre</label>
                <input type="text" name="segundoNombre" placeholder="Andres" required>
            </div>

            <div class="input-group">
                <label>Primer apellido</label>
                <input type="text" name="primerApellido" placeholder="Gonzalez" required>
            </div>

            <div class="input-group">
                <label>Segundo apellido</label>
                <input type="text" name="segundoApellido" placeholder="Banguero" required>
            </div>

            <div class="input-group">
                <label>Fecha de nacimiento</label>
                <input type="text" name="fechaNacimiento" placeholder="Dia/Mes/Año" required>
            </div>

            <div class="input-group">
                <label>Cédula o documento</label>
                <input type="text" name="documento" placeholder="1062313855" required>
            </div>

            <div class="input-group">
                <label>Dirección</label>
                <input type="text" name="direccion" placeholder="Crucero de Guali" required> 
            </div>

            <div class="input-group">
                <label>Ciudad</label>
                <input type="text" name="ciudad" placeholder="Caloto Cauca" required>
            </div>

            <div class="input-group">
                <label>Celular</label>
                <input type="text" name="celular" placeholder="3007041098" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Ejemplo@gmail.com" required>
            </div>
            
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" name="contrasena" placeholder="New pasword" required>
            </div>

            <div class="input-group">
                <label>Confirmar contraseña</label>
                <input type="password" name="confirmarContrasena" placeholder="Confirm pasword" required>
            </div>

            <!-- Botón centrado que envía el formulario -->
            <div class="button-container">
                <button type="submit" class="btn-guardar">Guardar</button>
            </div>
            
        </form>
        <p th:text="${mensaje}" style="color: white; margin-top: 15px; text-align:center;"></p>
    </div>
</body>
</html>
