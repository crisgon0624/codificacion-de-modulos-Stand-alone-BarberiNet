spring.application.name=barberia

# Configuraci\u00f3n de la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/barberia
spring.datasource.username=root
spring.datasource.password=123456789

# Driver y plataforma
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Muestra las consultas SQL en la consola (\u00fatil para aprender)
spring.jpa.show-sql=true

# Crea las tablas autom\u00e1ticamente si no existen (opcional)
spring.jpa.hibernate.ddl-auto=update

server.port=8085